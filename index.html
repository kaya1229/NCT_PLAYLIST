<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>취향의 NCT 플레이리스트</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --nct-neon: #CBFF00;
            --bg-yellow: #C5E061; 
            --nct-light: #E6F3A6; 
            --font-hand: 'Nanum Pen Script', cursive;
            --font-gothic: 'Pretendard', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            font-family: var(--font-gothic);
        }

        .playlist-card {
            background-color: var(--bg-yellow);
            width: 100%;
            max-width: 450px;
            padding: 25px 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        /* --- 헤더 영역 --- */
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
        
        .profile-container {
            width: 75px; height: 75px; border-radius: 50%; border: 3px solid #000;
            background-color: var(--nct-light); cursor: pointer; position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .profile-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; position: absolute; }
        .profile-img.uploaded { opacity: 1; }
        .profile-placeholder { position: absolute; font-size: 14px; color: #000; font-weight: 900; z-index: 1; }

        .title-area { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .badge-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .nct-badge {
            background: var(--nct-light); padding: 5px 15px; border-radius: 20px;
            font-size: 14px; font-weight: 900; border: none;
        }

        .logo-box { display: flex; align-items: center; gap: 4px; color: #000; font-weight: 900; }
        .logo-nct { font-size: 22px; letter-spacing: -1.5px; }
        .logo-text { font-size: 8px; line-height: 1.1; }

        .user-name-box {
            background: var(--nct-light); padding: 0 12px; border: none;
            border-radius: 8px; display: flex; align-items: center; justify-content: flex-end; height: 45px;
            box-sizing: border-box; width: 100%;
        }
        .editable-name { outline: none; font-weight: 900; font-size: 18px; text-align: right; min-width: 20px; }
        .fixed-text { font-size: 14px; font-weight: 900; margin-left: 4px; }

        /* --- 그리드 영역 --- */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .track-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 6px; width: 100%; overflow: hidden; }
        .hashtag { font-size: 10px; font-weight: 900; margin-bottom: 2px; }
        
        .album-cover-container { 
            width: 100%; 
            aspect-ratio: 1/1;
            background-color: #fff; 
            border-radius: 12px; 
            position: relative; 
            overflow: hidden;
            flex-shrink: 0;
        }
        .album-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .album-cover.uploaded { opacity: 1; }

        .song-title-box { 
            width: 100%; background: var(--nct-light); border-radius: 6px; 
            height: 28px; display: flex; justify-content: center; align-items: center; 
            padding: 0 5px; box-sizing: border-box; 
        }
        .song-title-text { 
            font-family: var(--font-hand); font-weight: bold; font-size: clamp(12px, 4vw, 16px); 
            white-space: nowrap; width: 100%; overflow: hidden; text-overflow: ellipsis; text-align: center;
        }

        /* --- 최애곡 바 --- */
        .favorite-bar { background: var(--nct-light); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 15px; border: none; cursor: pointer; }
        .fav-cover-container { width: 65px; height: 65px; border-radius: 8px; background-color: #fff; position: relative; overflow: hidden; flex-shrink: 0; }
        .fav-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; }
        .fav-cover.uploaded { opacity: 1; }
        
        .fav-info { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
        .fav-title { font-size: 30px; font-family: var(--font-hand); line-height: 1.1; display: block; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .progress-container { width: 100%; height: 5px; background: #bbb; border-radius: 2px; overflow: hidden; }
        .progress-fill { width: 70%; height: 100%; background: #000; }
        .my-favorite-text { font-size: 10px; font-weight: 900; text-align: right; margin-top: 5px; }

        .submit-btn { background-color: var(--nct-neon); border: 3px solid #000; padding: 12px 40px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0px #000; margin-top: 25px; border-radius: 10px; }
        .submit-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(2px, 2px); }

        /* --- 모달 및 결과 UI 복구 --- */
        .search-modal, .result-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border: 4px solid #000; width: 85%; max-width: 400px; z-index: 1000; box-shadow: 0 0 0 100vmax rgba(0,0,0,0.8); border-radius: 15px; }
        
        .close-modal-btn { display: block; margin: 15px auto 0; width: 50%; background-color: var(--nct-neon); border: 3px solid #000; padding: 12px 0; font-size: 16px; font-weight: 900; cursor: pointer; border-radius: 8px; box-shadow: 3px 3px 0px #000; transition: 0.1s; }
        .close-modal-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(3px, 3px); }

        .loading-lp { width: 60px; height: 60px; border-radius: 50%; border: 5px solid #000; background: radial-gradient(circle, #333 20%, #000 21%); margin: 20px auto; animation: rotateLP 2s linear infinite; position: relative; }
        @keyframes rotateLP { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-lp::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: var(--nct-neon); border-radius: 50%; }

        .rank-container { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; text-align: left; }
        .rank-item { display: flex; align-items: center; gap: 15px; padding: 10px 15px; border-radius: 12px; background: #f9f9f9; border: 2px solid #000; }
        .rank-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #000; object-fit: cover; flex-shrink: 0; }
        .rank-info { flex-grow: 1; }
        .rank-name { font-weight: 900; font-size: 16px; }
        .rank-score { font-size: 13px; color: #666; font-weight: bold; }
        .rank-number { font-weight: 900; font-size: 18px; color: var(--bg-yellow); -webkit-text-stroke: 1px #000; margin-right: 5px; }

        .opposite-section { margin-top: 25px; padding-top: 15px; border-top: 2px dashed #ccc; text-align: left; }
        .opposite-title { font-size: 16px; font-weight: 900; color: #ff4757; margin-bottom: 10px; }
        .opposite-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; background: #fff5f5; border: 2px solid #ff4757; }
        .opposite-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ff4757; object-fit: cover; flex-shrink: 0; }

        .share-btn { background-color: var(--nct-neon); border: 3px solid #000; padding: 12px; font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0px #000; margin-top: 15px; border-radius: 10px; width: 100%; transition: 0.1s; }
        .share-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }
        
        .result-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="playlist-card" id="captureArea">
    <div class="header">
        <div class="profile-container" onclick="document.getElementById('profileInput').click()">
            <div class="profile-placeholder">NCT</div>
            <img id="profileDisplay" src="#" class="profile-img">
            <input type="file" id="profileInput" style="display:none" onchange="loadProfile(event)">
        </div>
        <div class="title-area">
            <div class="badge-row">
                <span class="nct-badge">취향의 NCT</span>
                <div class="logo-box">
                    <span class="logo-nct">NCT</span>
                    <div class="logo-text">NCT 10TH<br>ANNIVERSARY</div>
                </div>
            </div>
            <div class="user-name-box">
                <span id="userName" class="editable-name" contenteditable="true">시즈니</span>
                <span class="fixed-text">'s Playlist</span>
            </div>
        </div>
    </div>

    <div class="grid-container" id="mainGrid"></div>

    <div class="favorite-bar" onclick="openSearch('fav')">
        <div class="fav-cover-container"><img id="favCover" src="#" class="fav-cover"></div>
        <div class="fav-info">
            <span id="favTitle" class="fav-title">선택안함</span>
            <div class="progress-container"><div class="progress-fill"></div></div>
            <span class="my-favorite-text">My Favorite...</span>
        </div>
    </div>
</div>

<button class="submit-btn" onclick="showRankResult()">제출하기</button>

<div class="search-modal" id="searchModal">
    <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="곡 제목 입력">
        <button class="search-btn" onclick="searchSong()">검색</button>
    </div>
    <div class="search-results" id="searchResults"></div>
    <button class="close-modal-btn" onclick="closeSearch()">닫기</button>
</div>

<div class="result-screen" id="resultScreen">
    <div style="text-align:center">
        <h2 style="margin-top:0">우리의 싱크로율</h2>
        <div style="width: 80px; height: 80px; background:#000; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:10px auto; font-size:24px; font-weight:bold; border:3px solid var(--nct-neon)">
            <span id="syncScore">0</span>%
        </div>
        <div id="rankList"></div>
        <div class="opposite-section">
            <div class="opposite-title">⚡ 극과 극 반대 취향</div>
            <div id="oppositeMember"></div>
        </div>
        <button class="share-btn" onclick="savePlaylistImage()">💚 취향표 이미지 저장</button>
        <button class="close-modal-btn" style="width:100%; background:#eee; box-shadow:none; margin-top:10px;" onclick="location.reload()">다시하기</button>
    </div>
</div>

<script>
    // [데이터 및 로직은 이전과 동일하되 normalize에 titleAlias 적용]
    const memberData = [ /* ... 기존 20명 데이터 ... */ 
        { name: "태용", img: "https://via.placeholder.com/100/CBFF00/000000?text=TY", tracks: ["PADO", "Touch", "영웅", "Make a wish", "Black on Black", "From home", "Baby don't stop", "Baggy Jeans", "Universe"], favorite: "Misfit" },
        { name: "쟈니", img: "https://via.placeholder.com/100/CBFF00/000000?text=JN", tracks: ["Ice tea", "surf", "broken melodies", "fact check", "parade", "from home", "baggy jeans", "gas", "cherry bomb"], favorite: "질주" },
        { name: "유타", img: "https://via.placeholder.com/100/CBFF00/000000?text=YT", tracks: ["touch", "promise you", "소방차", "sunny road", "from home", "back 2u", "fact check", "2baddies", "boss"], favorite: "영웅" },
        { name: "쿤", img: "https://via.placeholder.com/100/CBFF00/000000?text=KN", tracks: ["rainy day", "sweet dream", "love talk", "영웅", "the 7th sense", "no longer", "kick back", "phantom", "baggy jeans"], favorite: "first time" },
        { name: "텐", img: "https://via.placeholder.com/100/CBFF00/000000?text=TEN", tracks: ["steady", "beautiful", "resonance", "misfit", "baggy jeans", "from home", "baby don't stop", "work it", "make a wish"], favorite: "that's not fair" },
        { name: "샤오쥔", img: "https://via.placeholder.com/100/CBFF00/000000?text=XJ", tracks: ["beautiful", "all about you", "my everything", "the beat", "cherry bomb", "love after me", "baggy jeans", "turn back time", "resonance"], favorite: "cherry bomb" },
        { name: "헨드리", img: "https://via.placeholder.com/100/CBFF00/000000?text=HD", tracks: ["pado", "baby don't stop", "from home", "90's love", "the 7th sense", "beautiful", "cherry bomb", "the beat", "call D"], favorite: "misfit" },
        { name: "런쥔", img: "https://via.placeholder.com/100/CBFF00/000000?text=RJ", tracks: ["비트박스", "사랑한단 뜻이야", "트리거더피버", "문라잇", "일곱번째 감각", "my everything", "캔디", "스무디", "Beat it up"], favorite: "맛" },
        { name: "제노", img: "https://via.placeholder.com/100/CBFF00/000000?text=JN", tracks: ["Wish", "Touch", "Hello Future", "Fact Check", "Work It", "마지막 인사", "Baggy Jeans", "Far", "영웅"], favorite: "일곱번째 감각" },
        { name: "해찬", img: "https://via.placeholder.com/100/CBFF00/000000?text=HC", tracks: ["Hello Future", "주인공", "Dream Comes True", "Misfit", "뿔", "Back 2U", "Baggy Jeans", "영웅", "일곱번째 감각"], favorite: "Kick It" },
        { name: "재민", img: "https://via.placeholder.com/100/CBFF00/000000?text=JM", tracks: ["We Go Up", "주인공", "나의 모든 순간", "Dream Team", "Work It", "Dear Dream", "Chiller", "일곱번째 감각", "Make a Wish"], favorite: "Graduation" },
        { name: "양양", img: "https://via.placeholder.com/100/CBFF00/000000?text=YY", tracks: ["Chewing Gum", "My Everything", "Eternal White", "90's Love", "That's not fair", "윤슬", "영웅", "The 7th sense", "Universe"], favorite: "New Axis" },
        { name: "천러", img: "https://via.placeholder.com/100/CBFF00/000000?text=CL", tracks: ["Hello Future", "문", "Broken Melodies", "Trigger the Fever", "Cherry Bomb", "Graduation", "Beat it up", "Turn back time", "영웅"], favorite: "우리의 계절" },
        { name: "지성", img: "https://via.placeholder.com/100/CBFF00/000000?text=JS", tracks: ["덩크슛", "Vroom", "우리의 계절", "Trigger the Fever", "Work It", "Dear Dream", "Make a Wish", "영웅", "Black on Black"], favorite: "I hate fruits" },
        { name: "시온", img: "https://via.placeholder.com/100/CBFF00/000000?text=SO", tracks: ["Steady", "Touch", "텐데", "마지막 첫사랑", "소방차", "윤슬", "Kick It", "Black on Black", "Cherry Bomb"], favorite: "Baggy Jeans" },
        { name: "리쿠", img: "https://via.placeholder.com/100/CBFF00/000000?text=RK", tracks: ["Hello Future", "1000", "Misfit", "Make You Shine", "The 7th Sense", "나쁜 짓", "Hellow Mellow", "영웅", "Baggy Jeans"], favorite: "Steady" },
        { name: "유우시", img: "https://via.placeholder.com/100/CBFF00/000000?text=YS", tracks: ["We Go Up", "Once Again", "Favorite", "Work It", "영웅", "백야", "영웅", "Cherry Bomb", "Resonance"], favorite: "Wish" },
        { name: "재희", img: "https://via.placeholder.com/100/CBFF00/000000?text=JH", tracks: ["Wish", "First Time", "Broken Melodies", "프린스핑송", "일곱번째 감각", "나의 모든 순간", "영웅", "Ay-Yo", "Baggy Jeans"], favorite: "Coming Home" },
        { name: "료", img: "https://via.placeholder.com/100/CBFF00/000000?text=RY", tracks: ["Hello Future", "Sun&Moon", "Timeless", "0 Mile", "The 7th Sense", "Fly Away With Me", "Steady", "Mad City", "Baggy Jeans"], favorite: "나쁜 짓" },
        { name: "사쿠야", img: "https://via.placeholder.com/100/CBFF00/000000?text=SK", tracks: ["Best Friend Ever", "I.O.U", "Kick Back", "Paradise", "New Axis", "피아노", "백열등", "Gimme Gimme", "PADO"], favorite: "Dancing In The Rain" }
    ];

    const titleAlias = {
        "맛": "Hot Sauce", "영웅": "Kick It", "질주": "2 Baddies", "소방차": "Fire Truck",
        "사랑한단뜻이야": "Candle Light", "트리거더피버": "Trigger the Fever", 
        "일곱번째감각": "The 7th Sense", "캔디": "Candy", "스무디": "Smoothie",
        "마지막인사": "To My First", "뿔": "Mad Dog", "윤슬": "Gold Dust", 
        "우리의계절": "My Youth", "마지막첫사랑": "My First and Last", "문": "Moon",
        "주인공": "Focus", "나의모든순간": "No Longer", "덩크슛": "Dunk Shot", "텐데": "Timeless",
        "나쁜짓": "Baby Dont Like It", "백야": "White Night", "프린스핑송": "Ping Pong",
        "백열등": "Light Bulb", "피아노": "Piano"
    };

    const hashtags = ['#청량', '#설렘', '#벅참', '#신남', '#네오', '#슬픔', '#중독성', '#강렬', '#퍼포먼스'];
    const grid = document.getElementById('mainGrid');
    hashtags.forEach((tag, index) => {
        grid.innerHTML += `
            <div class="track-item" id="item-${index}" onclick="openSearch(${index})">
                <div class="hashtag">${tag}</div>
                <div class="album-cover-container"><img class="album-cover" src=""></div>
                <div class="song-title-box"><span class="song-title-text"></span></div>
            </div>
        `;
    });

    let currentItemIndex = null;
    function openSearch(idx) { currentItemIndex = idx; document.getElementById('searchModal').style.display = 'block'; }
    function closeSearch() { document.getElementById('searchModal').style.display = 'none'; }

    async function searchSong() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;
        const resDiv = document.getElementById('searchResults');
        resDiv.innerHTML = `<div style="text-align:center; padding:20px;"><div class="loading-lp"></div><b>Searching...</b></div>`;
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=NCT+${query}&entity=song&limit=10`);
            const data = await res.json();
            resDiv.innerHTML = '';
            data.results.forEach(s => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<img src="${s.artworkUrl60}" style="width:40px; border-radius:4px; margin-right:10px;">
                                 <div><strong>${s.trackName}</strong><br><small>${s.artistName}</small></div>`;
                div.onclick = () => selectSong(s.artworkUrl100.replace('100x100bb', '600x600bb'), s.trackName);
                resDiv.appendChild(div);
            });
        } catch(e) { resDiv.innerHTML = '검색 실패.'; }
    }

    function selectSong(url, title) {
        if(currentItemIndex === 'fav') {
            document.getElementById('favCover').src = url; document.getElementById('favCover').classList.add('uploaded');
            document.getElementById('favTitle').innerText = title;
        } else {
            const item = document.getElementById(`item-${currentItemIndex}`);
            const img = item.querySelector('.album-cover');
            img.src = url; img.classList.add('uploaded');
            item.querySelector('.song-title-text').innerText = title;
        }
        closeSearch();
    }

    function normalize(t) { 
        if(!t) return "";
        const pure = t.replace(/\s/g, "");
        const translated = titleAlias[pure] || t;
        return translated.toLowerCase().replace(/\([^)]*\)|[\s\-_]/g, ""); 
    }

    function showRankResult() {
        const userSongs = Array.from({length: 9}, (_, i) => document.getElementById(`item-${i}`).querySelector('.song-title-text').innerText).filter(s => s !== "");
        const userFav = document.getElementById('favTitle').innerText;

        const trackCounts = {};
        memberData.forEach(m => {
            m.tracks.forEach(t => {
                const nt = normalize(t);
                trackCounts[nt] = (trackCounts[nt] || 0) + 1;
            });
        });

        const results = memberData.map(m => {
            let score = 0;
            const mTracks = m.tracks.map(t => normalize(t));
            userSongs.forEach(uSong => {
                const uNorm = normalize(uSong);
                if(mTracks.includes(uNorm)) {
                    const pop = trackCounts[uNorm] || 1;
                    score += (10 + Math.max(1, 10 - pop));
                }
            });
            if(userFav !== "선택안함" && normalize(userFav) === normalize(m.favorite)) score += 30;
            return { ...m, finalScore: Math.min(Math.round((score/150)*100), 100) };
        }).sort((a,b) => b.finalScore - a.finalScore);

        document.getElementById('syncScore').innerText = results[0].finalScore;
        const rankList = document.getElementById('rankList');
        rankList.className = "rank-container";
        rankList.innerHTML = results.slice(0,3).map((r, i) => `
            <div class="rank-item">
                <div class="rank-number">${i+1}</div>
                <img src="${r.img}" class="rank-img">
                <div class="rank-info">
                    <div class="rank-name">💚 ${r.name}</div>
                    <div class="rank-score">싱크로율 ${r.finalScore}%</div>
                </div>
            </div>
        `).join('');

        const opposite = results[results.length - 1];
        document.getElementById('oppositeMember').innerHTML = `
            <div class="opposite-item">
                <img src="${opposite.img}" class="opposite-img">
                <div class="rank-info">
                    <div class="rank-name" style="color:#ff4757">⚡ ${opposite.name}</div>
                    <div class="rank-score" style="color:#ff4757">싱크로율 ${opposite.finalScore}%</div>
                </div>
            </div>
        `;
        document.getElementById('resultScreen').style.display = 'block';
    }

    function savePlaylistImage() {
        const card = document.getElementById('captureArea');
        html2canvas(card, { useCORS: true, backgroundColor: "#1a1a1a", scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `NCT_Playlist_${document.getElementById('userName').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function loadProfile(e) {
        const file = e.target.files[0];
        if(file) {
            document.getElementById('profileDisplay').src = URL.createObjectURL(file);
            document.getElementById('profileDisplay').classList.add('uploaded');
            document.querySelector('.profile-placeholder').style.display = 'none';
        }
    }
</script>
</body>
</html>
