<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Playlist Maker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root {
            --nct-neon: #CBFF00;
            --bg-yellow: #E2FF42;
            --nct-gray: #CCCCCC;
            --font-hand: 'Nanum Pen Script', cursive;
            --font-gothic: 'Pretendard', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            font-family: var(--font-gothic);
        }

        .playlist-card {
            background-color: var(--bg-yellow);
            width: 100%;
            max-width: 450px;
            padding: 25px 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .profile-container {
            position: relative;
            cursor: pointer;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid #000;
            background-color: var(--nct-gray);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .profile-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .profile-img.uploaded { opacity: 1; }
        .profile-placeholder { position: absolute; font-size: 14px; color: #fff; font-weight: 900; z-index: 1; }
        #profileInput { display: none; }

        .title-area { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }

        .badge-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nct-badge {
            background: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            border: 2.5px solid #000;
        }

        /* 이름 박스: 레퍼런스처럼 너비 확장 */
        .user-name-box {
            background: #fff;
            padding: 0 12px;
            border: 3px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 45px;
            box-sizing: border-box;
            width: 100%;
        }

        .editable-name { outline: none; font-weight: 900; white-space: nowrap; font-size: 18px; flex-grow: 0; text-align: right; overflow: hidden;max-width: 60%; }
        .fixed-text { white-space: pre; font-size: 12px; color: #000; font-weight: 900; flex-shrink: 0; margin-left: 4px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .track-item { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .hashtag { font-size: 10px; font-weight: 900; margin-bottom: 4px; }

        .album-cover-container {
            width: 100%; aspect-ratio: 1 / 1;
            background-color: var(--nct-gray);
            border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .album-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .album-cover.uploaded { opacity: 1; }
        .cover-placeholder { position: absolute; font-size: 12px; color: #fff; font-weight: 900; z-index: 1; }

        .song-title-box {
            width: 100%; background: #fff; border: none;
            border-radius: 6px; margin-top: 5px; height: 28px;
            display: flex; justify-content: center; align-items: center;
            padding: 0 6px; box-sizing: border-box; overflow: hidden;
        }

        .song-title-text {
            font-family: var(--font-hand); font-weight: bold; font-size: 15px;
            white-space: nowrap; outline: none; pointer-events: none;
        }

        /* 하단 Favorite 영역: 레이아웃 재조정 */
        .favorite-bar {
            background: #fff; border-radius: 20px; padding: 15px;
            display: flex; align-items: center; gap: 15px; border: 3px solid #000;
            box-sizing: border-box;
        }

        /* 최애곡 이미지: 60px로 축소 */
        .fav-cover-container {
            width: 60px; height: 60px; border-radius: 6px; border: 2px solid #000;
            background-color: var(--nct-gray); cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; flex-shrink: 0;
        }

        .fav-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .fav-cover.uploaded { opacity: 1; }
        .fav-placeholder { position: absolute; font-size: 12px; color: #fff; font-weight: 900; z-index: 1; }

        .fav-info { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }

        /* 최애곡 제목: 글자 크기 더더 키우기 */
        .fav-title {
            font-size: 48px; /* 극대화 */
            font-family: var(--font-hand); display: block;
            white-space: nowrap; overflow: hidden; margin-bottom: -5px; line-height: 1.1;
            pointer-events: none;
        }

        .progress-line-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        /* 재생바 길이 늘리기 */
        .progress-line { height: 5px; background: #eee; flex-grow: 1; margin-right: 12px; }
        .progress-fill { width: 75%; height: 100%; background: #000; }
        .my-favorite-text { font-size: 11px; color: #888; flex-shrink: 0; }

        .submit-btn {
            background-color: var(--nct-neon); border: 3px solid #000;
            padding: 12px 35px; font-size: 17px; font-weight: 900;
            cursor: pointer; box-shadow: 4px 4px 0px #000; margin-top: 25px;
        }

        .search-modal, .result-screen {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border: 4px solid #000; width: 85%; max-width: 400px; z-index: 1000;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.7);
        }
        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .search-input { flex-grow: 1; padding: 10px; border: 2px solid #000; outline: none; }
        .search-btn { padding: 10px 15px; background: var(--nct-neon); border: 2px solid #000; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .close-modal-btn {
    display: block;        /* 중앙 정렬을 위해 필요 */
    margin: 15px auto 0;   /* 위쪽 여백 15px, 좌우 자동(중앙 정렬) */
    padding: 10px 25px;    /* 좌우 패딩으로 너비 조절 */
    background: #eee; 
    border: 2px solid #000; 
    border-radius: 8px;    /* 요청하신 둥근 모서리 */
    font-weight: bold; 
    cursor: pointer;
    width: auto;           /* 콘텐츠에 맞게 너비 조절 */
}

/* 추가: 배경(모달 자체) 클릭 시 커서 모양을 기본으로 변경해 가독성 높이기 */
.search-modal {
    cursor: default;
}
        .search-results { max-height: 250px; overflow-y: auto; }
        .result-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        /* 검색 중 로딩 애니메이션 (LP판) */
.loading-lp-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    gap: 15px;
    color: #666;
    font-size: 14px;
}

.lp-spinner {
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #333 15%, #111 16%, #111 20%, #222 21%, #111 25%, #222 26%, #111 100%);
    border-radius: 50%;
    border: 2px solid #000;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    
    /* 회전 애니메이션 적용 */
    animation: spinLP 2s linear infinite;
}

/* LP 중앙 구멍 (네온 그린 포인트) */
.lp-spinner::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    background: var(--nct-neon); /* NCT 네온 그린 */
    border-radius: 50%;
    border: 2px solid #000;
}

/* 회전 애니메이션 정의 */
@keyframes spinLP {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
    </style>
</head>
<body>

<div class="playlist-card">
    <div class="header">
        <div class="profile-container" onclick="document.getElementById('profileInput').click()">
            <div class="profile-placeholder">NCT</div>
            <img id="profileDisplay" src="#" class="profile-img" alt="Profile">
            <input type="file" id="profileInput" accept="image/*" onchange="loadProfile(event)">
        </div>
        <div class="title-area">
            <div class="badge-row">
                <span class="nct-badge">취향의 NCT</span>
                <span style="font-size: 8px; font-weight: 900;">10TH ANNIVERSARY</span>
            </div>
            <div class="user-name-box">
                <span id="userName" class="editable-name" contenteditable="true" spellcheck="false" oninput="adjustNameFontSize()">시즈니</span>
                <span class="fixed-text">'s Playlist</span>
            </div>
        </div>
    </div>

    <div class="grid-container" id="mainGrid"></div>

    <div class="favorite-bar">
        <div class="fav-cover-container" onclick="openSearch('fav')">
            <div class="fav-placeholder">NCT</div>
            <img src="#" class="fav-cover" alt="Art">
        </div>
        <div class="fav-info">
            <span id="favTitle" class="fav-title"></span>
            <div class="progress-line-container">
                <div class="progress-line"><div class="progress-fill"></div></div>
                <span class="my-favorite-text">My Favorite...</span>
            </div>
        </div>
    </div>
</div>

<button class="submit-btn" onclick="showRankResult()">제출하기</button>

<div class="search-modal" id="searchModal">
    <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="곡 제목 입력">
        <button class="search-btn" onclick="searchSong()">검색</button>
    </div>
    <div class="search-results" id="searchResults"></div>
    <button class="close-modal-btn" onclick="closeSearch()">닫기</button>
</div>

<div class="result-screen" id="resultScreen">
    <h2 style="margin-bottom:10px;">시즈니 싱크로율</h2>
    <div style="width: 100px; height: 100px; border: 4px solid var(--nct-neon); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: 900; margin: 15px auto; background: #000; color: #fff;"><span id="syncScore">0</span>%</div>
    <p id="rankMessage" style="font-family: var(--font-hand); font-size: 22px; margin-bottom: 20px;"></p>
    <button style="padding:10px 20px; cursor:pointer; background:#000; color:#fff; border:none;" onclick="closeResult()">닫기</button>
</div>

<script>
    const nctSongs = ["무한적아", "Cherry Bomb", "질주", "Fact Check", "Hello Future", "Hot Sauce", "Candy", "Baggy Jeans", "Sticker", "영웅", "Ay-Yo", "ISTJ", "Smoothie", "Phantom", "Favorite", "We Go Up", "Walk", "삐그덕", "비트박스", "고래"];
    const hashtags = ['#청량', '#설렘', '#벅참', '#신남', '#네오', '#슬픔', '#중독성', '#강렬', '#퍼포먼스'];
    
    const grid = document.getElementById('mainGrid');
    hashtags.forEach((tag, index) => {
        grid.innerHTML += `
            <div class="track-item" id="item-${index}">
                <div class="hashtag">${tag}</div>
                <div class="album-cover-container" onclick="openSearch(${index})">
                    <div class="cover-placeholder">NCT</div>
                    <img class="album-cover" src="#" alt="Select">
                </div>
                <div class="song-title-box">
                    <span class="song-title-text"></span>
                </div>
            </div>
        `;
    });

    let currentItemIndex = null;

    function loadProfile(event) {
        const output = document.getElementById('profileDisplay');
        const ph = document.querySelector('.profile-placeholder');
        output.src = URL.createObjectURL(event.target.files[0]);
        output.classList.add('uploaded');
        if(ph) ph.style.display = 'none';
    }

    function adjustNameFontSize() {
    const el = document.getElementById('userName');
    let size = 18;
    el.style.fontSize = size + 'px';
    
    const parentWidth = el.parentElement.offsetWidth * 0.6; // 최대 너비 제한 대비
    while (el.scrollWidth > parentWidth && size > 10) {
        size--; 
        el.style.fontSize = size + 'px';
    }
}

    function adjustSongFontSize(el) {
        if(!el) return;
        let size = 15;
        el.style.fontSize = size + 'px';
        const parent = el.parentElement;
        while (el.scrollWidth > parent.offsetWidth - 8 && size > 7) {
            size--; el.style.fontSize = size + 'px';
        }
    }

    function adjustFavFontSize(el) {
        let size = 37;
        el.style.fontSize = size + 'px';
        const parent = el.parentElement;
        while (el.scrollWidth > parent.offsetWidth && size > 20) {
            size--; el.style.fontSize = size + 'px';
        }
    }

    window.onload = () => {
        const randomFav = nctSongs[Math.floor(Math.random() * nctSongs.length)];
        const favTitleEl = document.getElementById('favTitle');
        favTitleEl.innerText = randomFav;
        adjustNameFontSize();
        adjustFavFontSize(favTitleEl);
    };

    function openSearch(index) {
        currentItemIndex = index;
        document.getElementById('searchModal').style.display = 'block';
        document.getElementById('searchInput').focus();
    }

    function closeSearch() {
        document.getElementById('searchModal').style.display = 'none';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = '';
    }

    async function searchSong() {
    const query = document.getElementById('searchInput').value;
    if (!query) return;
    const resDiv = document.getElementById('searchResults');
    resDiv.innerHTML = `
        <div class="loading-lp-container">
            <div class="lp-spinner"></div>
            <div>음악 검색 중...</div>
        </div>
    `;
    
    try {
        const response = await fetch(`https://itunes.apple.com/search?term=NCT+${encodeURIComponent(query)}&entity=song&limit=15`);
        const data = await response.json();
        resDiv.innerHTML = '';

        // 결과가 없을 경우 멘트 추가
        if (data.results.length === 0) {
            resDiv.innerHTML = `
                <div style="text-align:center; padding:20px; color:#666;">
                    검색 결과가 없습니다.<br>
                    <strong>곡 제목을 영어로 검색해 보세요!</strong><br>
                    <small>(예: 삐그덕 -> Walk)</small>
                </div>`;
            return;
        }

        data.results.forEach(song => {
            const item = document.createElement('div');
            item.className = 'result-item';
            const highRes = song.artworkUrl100.replace('100x100bb', '600x600bb');
            item.innerHTML = `<img src="${song.artworkUrl60}" style="width:40px; border-radius:4px;">
                              <div><strong>${song.trackName}</strong></div>`;
            item.onclick = () => selectSong(highRes, song.trackName);
            resDiv.appendChild(item);
        });
    } catch (e) { 
        resDiv.innerHTML = '검색 중 오류가 발생했습니다.'; 
    }
}

    function selectSong(coverUrl, title) {
        if(currentItemIndex === 'fav') {
            const container = document.querySelector('.fav-cover-container');
            const img = container.querySelector('.fav-cover');
            const ph = container.querySelector('.fav-placeholder');
            img.src = coverUrl; img.classList.add('uploaded');
            if(ph) ph.style.display = 'none';
            const titleEl = document.getElementById('favTitle');
            titleEl.innerText = title; adjustFavFontSize(titleEl);
        } else {
            const item = document.getElementById(`item-${currentItemIndex}`);
            const img = item.querySelector('.album-cover');
            const ph = item.querySelector('.cover-placeholder');
            img.src = coverUrl; img.classList.add('uploaded');
            if(ph) ph.style.display = 'none';
            const textEl = item.querySelector('.song-title-text');
            textEl.innerText = title; adjustSongFontSize(textEl);
        }
        closeSearch();
    }
    // 배경 클릭 시 모달 닫기
window.addEventListener('click', function(event) {
    const modal = document.getElementById('searchModal');
    // 클릭된 대상이 'search-modal' 클래스를 가진 배경일 때만 닫기
    if (event.target === modal) {
        closeSearch();
    }
});

    function showRankResult() {
        const score = Math.floor(Math.random() * 41) + 60;
        document.getElementById('syncScore').innerText = score;
        document.getElementById('resultScreen').style.display = 'block';
        document.getElementById('rankMessage').innerText = score > 85 ? "완벽한 소울메이트! 💚" : "네오한 취향 가득!";
    }
    function closeResult() { document.getElementById('resultScreen').style.display = 'none'; }
</script>

</body>
</html>
