<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Playlist Maker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root {
            --nct-neon: #CBFF00;
            --bg-yellow: #E2FF42;
            --nct-gray: #CCCCCC;
            --font-hand: 'Nanum Pen Script', cursive;
            --font-gothic: 'Pretendard', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            font-family: var(--font-gothic);
        }

        .playlist-card {
            background-color: var(--bg-yellow);
            width: 100%;
            max-width: 450px;
            padding: 25px 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .profile-container {
            position: relative;
            cursor: pointer;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #000;
            background-color: var(--nct-gray);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .profile-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .profile-img.uploaded { opacity: 1; }
        .profile-placeholder { position: absolute; font-size: 14px; color: #fff; font-weight: 900; z-index: 1; }
        #profileInput { display: none; }

        .user-name-box {
            background: #fff;
            padding: 0 20px;
            border: 3px solid #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            box-sizing: border-box;
            width: 100%;
        }

        .editable-name { outline: none; font-weight: 900; white-space: nowrap; font-size: 20px; flex-grow: 1; text-align: left; overflow: hidden; }
        .fixed-text { white-space: pre; font-size: 12px; color: #000; font-weight: 900; flex-shrink: 0; margin-left: 5px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
            align-items: start;
        }

        .track-item { display: flex; flex-direction: column; align-items: center; width: 100%; overflow: hidden; }
        .hashtag { font-size: 11px; font-weight: 900; margin-bottom: 5px; height: 14px; }

        .album-cover-container {
            width: 100%; aspect-ratio: 1 / 1;
            background-color: var(--nct-gray);
            border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; box-sizing: border-box;
        }

        .album-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .album-cover.uploaded { opacity: 1; }
        .cover-placeholder { position: absolute; font-size: 14px; color: #fff; font-weight: 900; z-index: 1; }

        .song-title-box {
            width: 100%; background: #fff; border: none;
            border-radius: 8px; /* 모서리 곡률 조정: 더 네모나게 */
            margin-top: 6px; height: 32px;
            display: flex; justify-content: center; align-items: center;
            padding: 0 10px; box-sizing: border-box; overflow: hidden;
        }

        /* 폰트는 직접 입력 불가로 설정(pointer-events) */
        .song-title-text {
            font-family: var(--font-hand); font-weight: bold; font-size: 16px;
            white-space: nowrap; outline: none; max-width: 100%; pointer-events: none;
        }

        /* 하단 Favorite 영역 */
        .favorite-bar {
            background: #fff; border-radius: 20px; padding: 15px 20px;
            display: flex; align-items: center; gap: 15px; border: 3px solid #000;
            box-sizing: border-box; min-height: 120px;
        }

        /* 최애곡 이미지 크기: 80px로 조정 */
        .fav-cover-container {
            width: 80px; height: 80px; border-radius: 8px; border: 2px solid #000;
            background-color: var(--nct-gray); cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; flex-shrink: 0;
        }

        .fav-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .fav-cover.uploaded { opacity: 1; }
        .fav-placeholder { position: absolute; font-size: 14px; color: #fff; font-weight: 900; z-index: 1; }

        .fav-info { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }

        /* 최애곡 제목 폰트 키우기 */
        .fav-title {
            font-size: 42px; /* 더 키움 */
            font-family: var(--font-hand); display: block; outline: none;
            white-space: nowrap; overflow: hidden; margin-bottom: 5px;
            pointer-events: none; /* 직접 수정 방지 */
        }

        .progress-line-container { display: flex; justify-content: space-between; align-items: center; }
        .progress-line { height: 6px; background: #eee; flex-grow: 1; margin-right: 15px; }
        .progress-fill { width: 70%; height: 100%; background: #000; }
        .my-favorite-text { font-size: 12px; color: #888; outline:none; flex-shrink: 0; }

        .submit-btn {
            background-color: var(--nct-neon); border: 3px solid #000;
            padding: 15px 40px; font-size: 18px; font-weight: 900;
            cursor: pointer; box-shadow: 5px 5px 0px #000; margin-top: 25px;
        }

        /* 검색 모달 */
        .search-modal, .result-screen {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border: 4px solid #000; width: 85%; max-width: 400px; z-index: 1000;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.7);
        }
        .search-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-input { flex-grow: 1; padding: 10px; border: 2px solid #000; outline: none; }
        .search-btn { padding: 10px 15px; background: var(--nct-neon); border: 2px solid #000; font-weight: bold; cursor: pointer; }
        .search-results { max-height: 250px; overflow-y: auto; }
        .result-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="playlist-card">
    <div class="header">
        <div class="profile-container" onclick="document.getElementById('profileInput').click()">
            <div class="profile-placeholder">NCT</div>
            <img id="profileDisplay" src="#" class="profile-img" alt="Profile">
            <input type="file" id="profileInput" accept="image/*" onchange="loadProfile(event)">
        </div>
        <div class="title-area">
            <div class="badge-row">
                <span class="nct-badge">취향의 NCT</span>
                <span style="font-size: 9px; font-weight: 900;">NCT 10TH ANNIVERSARY</span>
            </div>
            <div class="user-name-box">
                <span id="userName" class="editable-name" contenteditable="true" spellcheck="false" oninput="adjustNameFontSize()">시즈니</span>
                <span class="fixed-text">'s Playlist</span>
            </div>
        </div>
    </div>

    <div class="grid-container" id="mainGrid"></div>

    <div class="favorite-bar">
        <div class="fav-cover-container" onclick="openSearch('fav')">
            <div class="fav-placeholder">NCT</div>
            <img src="#" class="fav-cover" alt="Art">
        </div>
        <div class="fav-info">
            <span id="favTitle" class="fav-title"></span>
            <div class="progress-line-container">
                <div class="progress-line"><div class="progress-fill"></div></div>
                <span contenteditable="true" class="my-favorite-text">My Favorite...</span>
            </div>
        </div>
    </div>
</div>

<button class="submit-btn" onclick="showRankResult()">제출하기</button>

<div class="search-modal" id="searchModal">
    <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="곡 제목 입력">
        <button class="search-btn" onclick="searchSong()">검색</button>
    </div>
    <div class="search-results" id="searchResults"></div>
    <button style="width:100%; margin-top:10px; padding:10px; background:#eee; border:2px solid #000; font-weight:bold; cursor:pointer;" onclick="closeSearch()">닫기</button>
</div>

<div class="result-screen" id="resultScreen">
    <h2 style="margin-bottom:10px;">시즈니 싱크로율</h2>
    <div style="width: 120px; height: 120px; border: 5px solid var(--nct-neon); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: 900; margin: 20px auto; background: #000; color: #fff;"><span id="syncScore">0</span>%</div>
    <p id="rankMessage" style="font-family: var(--font-hand); font-size: 22px; margin-bottom: 20px;"></p>
    <button style="padding:10px 20px; cursor:pointer; background:#000; color:#fff; border:none;" onclick="closeResult()">닫기</button>
</div>

<script>
    const nctSongs = ["무한적아", "Cherry Bomb", "질주", "Fact Check", "Hello Future", "Hot Sauce", "Candy", "Baggy Jeans", "Sticker", "영웅", "Ay-Yo", "ISTJ", "Smoothie", "Phantom", "Favorite", "We Go Up", "Chewing Gum", "BOOM", "Walk", "삐그덕"];
    const hashtags = ['#청량', '#설렘', '#벅참', '#신남', '#네오', '#슬픔', '#중독성', '#강렬', '#퍼포먼스'];
    
    const grid = document.getElementById('mainGrid');

    hashtags.forEach((tag, index) => {
        grid.innerHTML += `
            <div class="track-item" id="item-${index}">
                <div class="hashtag">${tag}</div>
                <div class="album-cover-container" onclick="openSearch(${index})">
                    <div class="cover-placeholder">NCT</div>
                    <img class="album-cover" src="#" alt="Select">
                </div>
                <div class="song-title-box">
                    <span class="song-title-text"></span>
                </div>
            </div>
        `;
    });

    let currentItemIndex = null;

    function loadProfile(event) {
        const output = document.getElementById('profileDisplay');
        const ph = document.querySelector('.profile-placeholder');
        output.src = URL.createObjectURL(event.target.files[0]);
        output.classList.add('uploaded');
        if(ph) ph.style.display = 'none';
    }

    function adjustNameFontSize() {
        const el = document.getElementById('userName');
        let size = 20;
        el.style.fontSize = size + 'px';
        while (el.scrollWidth > el.offsetWidth && size > 10) {
            size--; el.style.fontSize = size + 'px';
        }
    }

    function adjustSongFontSize(el) {
        if(!el) return;
        let size = 16;
        el.style.fontSize = size + 'px';
        const parent = el.parentElement;
        while (el.scrollWidth > parent.offsetWidth - 10 && size > 7) {
            size--; el.style.fontSize = size + 'px';
        }
    }

    function adjustFavFontSize(el) {
        let size = 42;
        el.style.fontSize = size + 'px';
        const parent = el.parentElement;
        while (el.scrollWidth > parent.offsetWidth - 5 && size > 18) {
            size--; el.style.fontSize = size + 'px';
        }
    }

    window.onload = () => {
        const randomFav = nctSongs[Math.floor(Math.random() * nctSongs.length)];
        const favTitleEl = document.getElementById('favTitle');
        favTitleEl.innerText = randomFav;
        adjustNameFontSize();
        adjustFavFontSize(favTitleEl);
    };

    function openSearch(index) {
        currentItemIndex = index;
        document.getElementById('searchModal').style.display = 'block';
        document.getElementById('searchInput').focus();
    }

    function closeSearch() {
        document.getElementById('searchModal').style.display = 'none';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = '';
    }

    async function searchSong() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;
        const resDiv = document.getElementById('searchResults');
        resDiv.innerHTML = '검색 중...';
        try {
            const response = await fetch(`https://itunes.apple.com/search?term=NCT+${encodeURIComponent(query)}&entity=song&limit=15`);
            const data = await response.json();
            resDiv.innerHTML = '';
            if (data.results.length === 0) { resDiv.innerHTML = '결과가 없습니다.'; return; }
            data.results.forEach(song => {
                const item = document.createElement('div');
                item.className = 'result-item';
                const highRes = song.artworkUrl100.replace('100x100bb', '600x600bb');
                item.innerHTML = `<img src="${song.artworkUrl60}" style="width:40px; border-radius:4px;"><div><strong>${song.trackName}</strong><br><small>${song.collectionName}</small></div>`;
                item.onclick = () => selectSong(highRes, song.trackName);
                resDiv.appendChild(item);
            });
        } catch (e) { resDiv.innerHTML = '검색 실패'; }
    }

    function selectSong(coverUrl, title) {
        if(currentItemIndex === 'fav') {
            const container = document.querySelector('.fav-cover-container');
            const img = container.querySelector('.fav-cover');
            const ph = container.querySelector('.fav-placeholder');
            img.src = coverUrl; img.classList.add('uploaded');
            if(ph) ph.style.display = 'none';
            const titleEl = document.getElementById('favTitle');
            titleEl.innerText = title; adjustFavFontSize(titleEl);
        } else {
            const item = document.getElementById(`item-${currentItemIndex}`);
            const img = item.querySelector('.album-cover');
            const ph = item.querySelector('.cover-placeholder');
            img.src = coverUrl; img.classList.add('uploaded');
            if(ph) ph.style.display = 'none';
            const textEl = item.querySelector('.song-title-text');
            textEl.innerText = title; adjustSongFontSize(textEl);
        }
        closeSearch();
    }

    function showRankResult() {
        const score = Math.floor(Math.random() * 41) + 60;
        document.getElementById('syncScore').innerText = score;
        document.getElementById('resultScreen').style.display = 'block';
        document.getElementById('rankMessage').innerText = score > 85 ? "완벽한 소울메이트! 💚" : "네오한 취향이 가득하시군요!";
    }

    function closeResult() { document.getElementById('resultScreen').style.display = 'none'; }
</script>

</body>
</html>
