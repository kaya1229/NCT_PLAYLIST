<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Playlist Maker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root {
            --nct-neon: #CBFF00;
            --bg-yellow: #E2FF42;
            --nct-gray: #CCCCCC;
            --font-hand: 'Nanum Pen Script', cursive;
            --font-gothic: 'Pretendard', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            font-family: var(--font-gothic);
        }

        .playlist-card {
            background-color: var(--bg-yellow);
            width: 100%;
            max-width: 450px;
            padding: 25px 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .profile-container {
            position: relative;
            cursor: pointer;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #000;
            background-color: var(--nct-gray);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 2;
        }

        .profile-img.uploaded { opacity: 1; }
        .profile-placeholder { position: absolute; font-size: 14px; color: #fff; font-weight: 900; z-index: 1; }
        #profileInput { display: none; }

        .title-area { flex-grow: 1; overflow: hidden; }

        .badge-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .nct-badge {
            background: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            border: 2px solid #000;
        }

        .user-name-box {
            background: #fff;
            padding: 0 15px;
            border: 3px solid #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            box-sizing: border-box;
        }

        .editable-name {
            outline: none;
            font-weight: 900;
            white-space: nowrap;
            font-size: 20px;
            flex-grow: 1;
            text-align: left;
            overflow: hidden;
        }

        .fixed-text {
            white-space: pre;
            font-size: 12px;
            color: #000;
            font-weight: 900;
            flex-shrink: 0;
            margin-left: 5px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .track-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hashtag {
            font-size: 11px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .album-cover-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--nct-gray);
            border: 2px solid #000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .album-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 2;
        }

        .album-cover.uploaded { opacity: 1; }
        .cover-placeholder { position: absolute; font-size: 14px; color: #fff; font-weight: 900; z-index: 1; }

        .song-title-box {
            width: calc(100% - 4px);
            background: #fff;
            border: 2px solid #000;
            margin-top: 6px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 4px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .song-title-text {
            font-family: var(--font-hand);
            font-weight: bold;
            font-size: 18px;
            white-space: nowrap;
            outline: none;
        }

        .favorite-bar {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 3px solid #000;
        }

        .fav-cover-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            border: 1px solid #000;
            background-color: var(--nct-gray);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .fav-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .fav-cover.uploaded { opacity: 1; }
        .fav-placeholder { position: absolute; font-size: 10px; color: #fff; font-weight: 900; z-index: 1; }

        .fav-info { flex-grow: 1; overflow: hidden; }
        .fav-title { font-size: 24px; font-family: var(--font-hand); display: block; outline: none; white-space: nowrap; overflow: hidden; }

        .progress-line-container { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .progress-line { height: 4px; background: #eee; flex-grow: 1; margin-right: 10px; }
        .progress-fill { width: 70%; height: 100%; background: #000; }
        .my-favorite-text { font-size: 10px; color: #888; outline:none; flex-shrink: 0; }

        .submit-btn {
            background-color: var(--nct-neon);
            border: 3px solid #000;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 5px 5px 0px #000;
            margin-top: 25px;
        }

        .submit-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        /* 모달 & 결과 화면 */
        .search-modal, .result-screen {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 25px;
            border: 4px solid #000;
            width: 85%;
            max-width: 400px;
            z-index: 1000;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.7);
        }

        .result-screen { text-align: center; }
        .search-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .search-input { flex-grow: 1; padding: 12px; border: 2px solid #000; font-size: 16px; outline: none; }
        .search-btn { padding: 12px 20px; background: var(--nct-neon); border: 2px solid #000; font-weight: bold; cursor: pointer; }
        .search-results { max-height: 250px; overflow-y: auto; }
        .result-item { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        
        .rank-circle {
            width: 120px; height: 120px; border: 5px solid var(--nct-neon); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: 900; margin: 20px auto; background: #000; color: #fff;
        }
    </style>
</head>
<body>

<div class="playlist-card">
    <div class="header">
        <div class="profile-container" onclick="document.getElementById('profileInput').click()">
            <div class="profile-placeholder">NCT</div>
            <img id="profileDisplay" src="#" class="profile-img" alt="Profile">
            <input type="file" id="profileInput" accept="image/*" onchange="loadProfile(event)">
        </div>
        <div class="title-area">
            <div class="badge-row">
                <span class="nct-badge">취향의 NCT</span>
                <span style="font-size: 9px; font-weight: 900;">NCT 10TH ANNIVERSARY</span>
            </div>
            <div class="user-name-box">
                <span id="userName" class="editable-name" contenteditable="true" spellcheck="false" oninput="adjustNameFontSize()">시즈니</span>
                <span class="fixed-text">'s Playlist</span>
            </div>
        </div>
    </div>

    <div class="grid-container" id="mainGrid"></div>

    <div class="favorite-bar">
        <div class="fav-cover-container" onclick="openSearch('fav')">
            <div class="fav-placeholder">NCT</div>
            <img src="#" class="fav-cover" alt="Art">
        </div>
        <div class="fav-info">
            <span id="favTitle" class="fav-title" contenteditable="true" spellcheck="false" oninput="adjustSongFontSize(this)"></span>
            <div class="progress-line-container">
                <div class="progress-line"><div class="progress-fill"></div></div>
                <span contenteditable="true" class="my-favorite-text">My Favorite...</span>
            </div>
        </div>
    </div>
</div>

<button class="submit-btn" onclick="showRankResult()">제출하기</button>

<div class="search-modal" id="searchModal">
    <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="곡 제목 입력">
        <button class="search-btn" onclick="searchSong()">검색</button>
    </div>
    <div class="search-results" id="searchResults"></div>
    <button style="width:100%; margin-top:15px; padding:10px; background:#eee; border:2px solid #000; font-weight:bold; cursor:pointer;" onclick="closeSearch()">닫기</button>
</div>

<div class="result-screen" id="resultScreen">
    <h2 style="margin-bottom:10px;">시즈니 싱크로율</h2>
    <div class="rank-circle"><span id="syncScore">0</span>%</div>
    <p id="rankMessage" style="font-family: var(--font-hand); font-size: 22px; margin-bottom: 20px;"></p>
    <button style="padding:10px 20px; cursor:pointer; background:#000; color:#fff; border:none;" onclick="closeResult()">닫기</button>
</div>

<script>
    const nctSongs = ["무한적아", "Cherry Bomb", "질주", "Fact Check", "Hello Future", "Hot Sauce", "Candy", "Baggy Jeans", "Universe", "RESONANCE", "Simon Says", "영웅", "Ay-Yo", "ISTJ", "Smoothie", "Phantom", "On My Youth", "Sticker", "Favorite", "We Go Up", "Chewing Gum", "BOOM", "Broken Melodies", "YESTODAY", "일곱 번째 감각", "WITHOUT YOU", "My Page", "Love Me Now", "Skyscraper", "Golden Age", "삐그덕", "Walk"];
    const hashtags = ['#청량', '#설렘', '#벅참', '#신남', '#네오', '#슬픔', '#중독성', '#강렬', '#퍼포먼스'];
    
    const grid = document.getElementById('mainGrid');

    // 1. 그리드 생성 (제목 빈칸 유지)
    hashtags.forEach((tag, index) => {
        grid.innerHTML += `
            <div class="track-item" id="item-${index}">
                <div class="hashtag">${tag}</div>
                <div class="album-cover-container" onclick="openSearch(${index})">
                    <div class="cover-placeholder">NCT</div>
                    <img class="album-cover" src="#" alt="Select">
                </div>
                <div class="song-title-box">
                    <span class="song-title-text" contenteditable="true" oninput="adjustSongFontSize(this)"></span>
                </div>
            </div>
        `;
    });

    let currentItemIndex = null;

    // 프로필 업로드 시 로고 삭제
    function loadProfile(event) {
        const output = document.getElementById('profileDisplay');
        const container = document.querySelector('.profile-container');
        const placeholder = container.querySelector('.profile-placeholder');
        output.src = URL.createObjectURL(event.target.files[0]);
        output.classList.add('uploaded');
        if(placeholder) placeholder.style.display = 'none';
    }

    function adjustNameFontSize() {
        const el = document.getElementById('userName');
        let size = 20;
        el.style.fontSize = size + 'px';
        while (el.scrollWidth > el.offsetWidth && size > 10) {
            size--;
            el.style.fontSize = size + 'px';
        }
    }

    function adjustSongFontSize(el) {
        if(!el) return;
        let size = 18;
        el.style.fontSize = size + 'px';
        const parent = el.parentElement;
        while (el.scrollWidth > parent.offsetWidth - 8 && size > 8) {
            size--;
            el.style.fontSize = size + 'px';
        }
    }

    window.onload = () => {
        const randomFav = nctSongs[Math.floor(Math.random() * nctSongs.length)];
        const favTitleEl = document.getElementById('favTitle');
        favTitleEl.innerText = randomFav;
        adjustNameFontSize();
        adjustSongFontSize(favTitleEl);
    };

    function openSearch(index) {
        currentItemIndex = index;
        document.getElementById('searchModal').style.display = 'block';
        document.getElementById('searchInput').focus();
    }

    function closeSearch() {
        document.getElementById('searchModal').style.display = 'none';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = '';
    }

    async function searchSong() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '검색 중...';

        try {
            const response = await fetch(`https://itunes.apple.com/search?term=NCT+${encodeURIComponent(query)}&entity=song&limit=15`);
            const data = await response.json();
            resultsDiv.innerHTML = '';
            
            if (data.results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding:10px;">결과가 없어요. 영문 제목으로 검색해 보세요!</div>';
                return;
            }

            data.results.forEach(song => {
                const item = document.createElement('div');
                item.className = 'result-item';
                const highResCover = song.artworkUrl100.replace('100x100bb', '600x600bb');
                item.innerHTML = `
                    <img src="${song.artworkUrl60}" style="width:40px; border:1px solid #000;">
                    <div><strong>${song.trackName}</strong><br><small>${song.artistName}</small></div>
                `;
                item.onclick = () => selectSong(highResCover, song.trackName);
                resultsDiv.appendChild(item);
            });
        } catch (e) { resultsDiv.innerHTML = '검색 실패'; }
    }

    // 곡 선택 시 앨범 로고 삭제 및 제목 자동 크기 조절
    function selectSong(coverUrl, title) {
        if(currentItemIndex === 'fav') {
            const container = document.querySelector('.fav-cover-container');
            const img = container.querySelector('.fav-cover');
            const ph = container.querySelector('.fav-placeholder');
            img.src = coverUrl; img.classList.add('uploaded');
            if(ph) ph.style.display = 'none';
            const titleEl = document.getElementById('favTitle');
            titleEl.innerText = title;
            adjustSongFontSize(titleEl);
        } else {
            const item = document.getElementById(`item-${currentItemIndex}`);
            const img = item.querySelector('.album-cover');
            const ph = item.querySelector('.cover-placeholder');
            img.src = coverUrl; img.classList.add('uploaded');
            if(ph) ph.style.display = 'none';
            const textEl = item.querySelector('.song-title-text');
            textEl.innerText = title;
            adjustSongFontSize(textEl);
        }
        closeSearch();
    }

    function showRankResult() {
        const score = Math.floor(Math.random() * 41) + 60;
        document.getElementById('syncScore').innerText = score;
        document.getElementById('resultScreen').style.display = 'block';
        let msg = "우린 제법 소울메이트! 💚";
        if(score > 90) msg = "광야에서도 만날 운명! 완벽해요!";
        document.getElementById('rankMessage').innerText = msg;
    }

    function closeResult() {
        document.getElementById('resultScreen').style.display = 'none';
    }
</script>

</body>
</html>
