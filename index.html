<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Playlist Maker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root {
            --nct-neon: #CBFF00;
            --bg-yellow: #E2FF42;
            --nct-gray: #CCCCCC; /* 기본 이미지용 회색 */
            --font-hand: 'Nanum Pen Script', cursive;
            --font-gothic: 'Pretendard', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            font-family: var(--font-gothic);
        }

        .playlist-card {
            background-color: var(--bg-yellow);
            width: 100%;
            max-width: 450px;
            padding: 25px 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .profile-container {
            position: relative;
            cursor: pointer;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #000;
            object-fit: cover;
            background-color: var(--nct-gray);
        }

        #profileInput { display: none; }

        .title-area { flex-grow: 1; }

        .badge-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .nct-badge {
            background: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 900;
            border: 2px solid #000;
        }

        /* 이름 입력 영역 - 's Playlist 고정 */
        .user-name-box {
            background: #fff;
            padding: 12px;
            border: 3px solid #000;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .editable-name {
            outline: none;
            min-width: 50px;
            display: inline-block;
            border-bottom: 1px dashed #ccc; /* 입력 가능한 곳임을 표시 */
            padding-right: 5px;
        }

        .fixed-text {
            white-space: pre;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .track-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hashtag {
            font-size: 13px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--nct-gray);
            border: 2px solid #000;
            cursor: pointer;
            object-fit: cover;
        }

        .song-title-box {
            width: calc(100% - 4px);
            background: #fff;
            border: 2px solid #000;
            margin-top: 6px;
            padding: 4px 0;
            font-size: 18px;
            text-align: center;
            font-family: var(--font-hand);
            font-weight: bold;
            min-height: 24px;
        }

        .favorite-bar {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 3px solid #000;
        }

        .fav-cover {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            border: 1px solid #000;
            background-color: var(--nct-gray);
            cursor: pointer;
        }

        .fav-info { flex-grow: 1; }

        .fav-title {
            font-size: 24px;
            font-family: var(--font-hand);
            display: block;
            outline: none;
        }

        .progress-line {
            height: 4px;
            background: #eee;
            margin-top: 8px;
        }

        .progress-fill { width: 70%; height: 100%; background: #000; }

        /* 검색 모달 */
        .search-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 25px;
            border: 4px solid #000;
            width: 85%;
            max-width: 400px;
            z-index: 1000;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.7);
        }

        .search-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .search-input {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #000;
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            padding: 12px 20px;
            background: var(--nct-neon);
            border: 2px solid #000;
            font-weight: bold;
            cursor: pointer;
        }

        .search-results {
            max-height: 250px;
            overflow-y: auto;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="playlist-card">
    <div class="header">
        <div class="profile-container" onclick="document.getElementById('profileInput').click()">
            <img id="profileDisplay" src="https://via.placeholder.com/90/CCCCCC/000000?text=NCT" class="profile-img" alt="Profile">
            <input type="file" id="profileInput" accept="image/*" onchange="loadProfile(event)">
        </div>
        <div class="title-area">
            <div class="badge-row">
                <span class="nct-badge">취향의 NCT</span>
                <span style="font-size: 10px; font-weight: 900;">NCT 10TH ANNIVERSARY</span>
            </div>
            <div class="user-name-box">
                <span class="editable-name" contenteditable="true" spellcheck="false">쟈니컬</span>
                <span class="fixed-text"> 's Playlist</span>
            </div>
        </div>
    </div>

    <div class="grid-container">
        <script>
            const hashtags = ['#청량', '#설렘', '#벅참', '#신남', '#네오', '#슬픔', '#중독성', '#강렬', '#퍼포먼스'];
            hashtags.forEach((tag, index) => {
                document.write(`
                    <div class="track-item" id="item-${index}">
                        <div class="hashtag">${tag}</div>
                        <img class="album-cover" onclick="openSearch(${index})" src="https://via.placeholder.com/150/CCCCCC/000000?text=NCT" alt="Select">
                        <div class="song-title-box">곡 제목</div>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="favorite-bar">
        <img src="https://via.placeholder.com/50/CCCCCC/000000?text=NCT" class="fav-cover" onclick="openSearch('fav')">
        <div class="fav-info">
            <span class="fav-title" contenteditable="true" spellcheck="false">질주 (2 Baddies)</span>
            <div class="progress-line"><div class="progress-fill"></div></div>
        </div>
        <span contenteditable="true" style="font-size: 10px; color: #888; outline:none;">My Favorite...</span>
    </div>

    <div class="search-modal" id="searchModal">
        <div class="search-row">
            <input type="text" class="search-input" id="searchInput" placeholder="곡 제목 입력">
            <button class="search-btn" onclick="searchSong()">검색</button>
        </div>
        <div class="search-results" id="searchResults"></div>
        <button style="width:100%; margin-top:15px; padding:10px; background:#eee; border:2px solid #000; font-weight:bold;" onclick="closeSearch()">닫기</button>
    </div>
</div>

<script>
    let currentItemIndex = null;

    function loadProfile(event) {
        const output = document.getElementById('profileDisplay');
        output.src = URL.createObjectURL(event.target.files[0]);
    }

    function openSearch(index) {
        currentItemIndex = index;
        document.getElementById('searchModal').style.display = 'block';
        document.getElementById('searchInput').focus();
    }

    function closeSearch() {
        document.getElementById('searchModal').style.display = 'none';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = '';
    }

    async function searchSong() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '검색 중...';

        try {
            const response = await fetch(`https://itunes.apple.com/search?term=NCT+${query}&entity=song&limit=10`);
            const data = await response.json();
            resultsDiv.innerHTML = '';

            data.results.forEach(song => {
                const item = document.createElement('div');
                item.className = 'result-item';
                const highResCover = song.artworkUrl100.replace('100x100bb', '600x600bb');
                item.innerHTML = `
                    <img src="${song.artworkUrl60}" style="width:40px; border-radius:4px; border:1px solid #000;">
                    <div><strong>${song.trackName}</strong><br><small>${song.artistName}</small></div>
                `;
                item.onclick = () => selectSong(highResCover, song.trackName);
                resultsDiv.appendChild(item);
            });
        } catch (e) { resultsDiv.innerHTML = '검색 실패'; }
    }

    function selectSong(coverUrl, title) {
        if(currentItemIndex === 'fav') {
            document.querySelector('.fav-cover').src = coverUrl;
            document.querySelector('.fav-title').innerText = title;
        } else {
            const item = document.getElementById(`item-${currentItemIndex}`);
            item.querySelector('.album-cover').src = coverUrl;
            item.querySelector('.song-title-box').innerText = title;
        }
        closeSearch();
    }
</script>

</body>
</html>
