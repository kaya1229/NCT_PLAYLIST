<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NCT Playlist UI with iTunes API</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root {
            --nct-neon: #CBFF00; /* NCT 공식 네온 그린 */
            --bg-yellow: #E2FF42; /* 레퍼런스 배경 노란빛 그린 */
            --font-hand: 'Nanum Pen Script', cursive; /* 레퍼런스 손글씨 */
            --font-gothic: 'Pretendard', sans-serif; /* 레퍼런스 기본 텍스트 */
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--font-gothic);
        }

        .playlist-card {
            background-color: var(--bg-yellow);
            width: 360px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 상단 프로필 영역 */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #000;
            object-fit: cover;
        }

        .title-area {
            flex-grow: 1;
        }

        .badge-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .nct-badge {
            background: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            border: 1px solid #000;
        }

        .user-name-box {
            background: #fff;
            padding: 10px;
            border: 2px solid #000;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            font-family: var(--font-gothic);
        }

        /* 3x3 그리드 영역 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .track-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hashtag {
            font-size: 11px;
            font-weight: 900;
            margin-bottom: 4px;
            font-family: var(--font-gothic);
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #ddd;
            border: 2px solid #000;
            cursor: pointer;
            transition: transform 0.2s;
            object-fit: cover;
        }

        .album-cover:hover {
            transform: scale(1.05);
        }

        .song-title-box {
            width: calc(100% - 2px);
            background: #fff;
            border: 2px solid #000;
            margin-top: 5px;
            padding: 2px 0;
            font-size: 18px;
            text-align: center;
            font-family: var(--font-hand); /* 손글씨 폰트 적용 */
            font-weight: bold;
        }

        /* 하단 최애곡 영역 */
        .favorite-bar {
            background: #fff;
            border-radius: 15px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #000;
        }

        .fav-cover {
            width: 40px;
            height: 40px;
            border-radius: 5px;
        }

        .fav-info {
            flex-grow: 1;
        }

        .fav-title {
            font-size: 20px;
            font-family: var(--font-hand); /* 손글씨 폰트 적용 */
            display: block;
        }

        .progress-line {
            height: 3px;
            background: #eee;
            margin-top: 5px;
            position: relative;
        }

        .progress-fill {
            width: 60%;
            height: 100%;
            background: #000;
        }

        /* 검색 모달 스타일 */
        .search-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px;
            border: 3px solid #000;
            width: 80%;
            z-index: 100;
        }

        .search-input {
            width: 80%;
            padding: 8px;
            border: 2px solid #000;
            font-family: var(--font-gothic);
        }

        .search-btn {
            padding: 8px 15px;
            background: var(--nct-neon);
            border: 2px solid #000;
            font-family: var(--font-gothic);
            font-weight: bold;
            cursor: pointer;
        }

        .search-results {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .result-item:hover {
            background: #f5f5f5;
        }

        .result-cover {
            width: 40px;
            height: 40px;
        }
    </style>
</head>
<body>

<div class="playlist-card">
    <div class="header">
        <img src="https://via.placeholder.com/80" class="profile-img" alt="Profile">
        <div class="title-area">
            <div class="badge-row">
                <span class="nct-badge">취향의 NCT</span>
                <span style="font-size: 10px; font-weight: 900;">NCT 10TH ANNIVERSARY</span>
            </div>
            <div class="user-name-box">쟈니컬 's Playlist</div>
        </div>
    </div>

    <div class="grid-container">
        <script>
            const hashtags = ['#청량', '#설렘', '#벅참', '#신남', '#네오', '#슬픔', '#중독성', '#강렬', '#퍼포먼스'];
            hashtags.forEach((tag, index) => {
                document.write(`
                    <div class="track-item" id="item-${index}">
                        <div class="hashtag">${tag}</div>
                        <img class="album-cover" onclick="openSearch(${index})" src="https://via.placeholder.com/150" alt="Select Song">
                        <div class="song-title-box">곡 제목 입력</div>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="favorite-bar">
        <img src="https://via.placeholder.com/40" class="fav-cover">
        <div class="fav-info">
            <span class="fav-title">질주 (2 Baddies)</span>
            <div class="progress-line"><div class="progress-fill"></div></div>
        </div>
        <span style="font-size: 8px; color: #888;">My Favorite...</span>
    </div>

    <div class="search-modal" id="searchModal">
        <input type="text" class="search-input" id="searchInput" placeholder="NCT 곡 제목을 입력하세요">
        <button class="search-btn" onclick="searchSong()">검색</button>
        <div class="search-results" id="searchResults"></div>
        <button style="margin-top:10px; padding: 5px; border:1px solid #000; cursor:pointer;" onclick="closeSearch()">닫기</button>
    </div>
</div>

<script>
    let currentItemIndex = null; // 현재 선택된 그리드 칸 번호

    // 검색 모달 열기
    function openSearch(index) {
        currentItemIndex = index;
        document.getElementById('searchModal').style.display = 'block';
        document.getElementById('searchInput').focus();
    }

    // 검색 모달 닫기
    function closeSearch() {
        document.getElementById('searchModal').style.display = 'none';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = '';
    }

    // iTunes API를 이용한 곡 검색
    async function searchSong() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '검색 중...';

        try {
            // NCT로 검색 결과 제한하여 정확도 높이기
            const response = await fetch(`https://itunes.apple.com/search?term=NCT+${query}&entity=song&limit=10`);
            const data = await response.json();

            resultsDiv.innerHTML = ''; // 결과 초기화

            data.results.forEach(song => {
                const item = document.createElement('div');
                item.className = 'result-item';
                // 고화질 앨범 아트를 위한 URL 수정
                const highResCover = song.artworkUrl100.replace('100x100bb', '600x600bb');

                item.innerHTML = `
                    <img src="${song.artworkUrl60}" class="result-cover">
                    <div>
                        <strong>${song.trackName}</strong><br>
                        <span style="font-size:12px; color:#666;">${song.artistName}</span>
                    </div>
                `;
                // 곡 선택 시 그리드에 반영
                item.onclick = () => selectSong(highResCover, song.trackName);
                resultsDiv.appendChild(item);
            });

        } catch (error) {
            resultsDiv.innerHTML = '검색 실패 ㅠㅠ';
            console.error(error);
        }
    }

    // 선택한 곡을 그리드 칸에 채우기
    function selectSong(coverUrl, title) {
        const item = document.getElementById(`item-${currentItemIndex}`);
        item.querySelector('.album-cover').src = coverUrl; // 이미지 변경
        item.querySelector('.song-title-box').innerText = title; // 제목 변경
        closeSearch(); // 모달 닫기
    }
</script>

</body>
</html>
