<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Playlist Maker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root {
            --nct-neon: #CBFF00;
            --bg-yellow: #E2FF42;
            --nct-gray: #CCCCCC;
            --font-hand: 'Nanum Pen Script', cursive;
            --font-gothic: 'Pretendard', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            font-family: var(--font-gothic);
        }

        .playlist-card {
            background-color: var(--bg-yellow);
            width: 100%;
            max-width: 450px;
            padding: 25px 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        /* 프로필 영역 수정 */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .profile-container {
            position: relative;
            cursor: pointer;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #000;
            background-color: var(--nct-gray); /* 원형 유지용 배경색 */
            overflow: hidden; /* 이미지가 원 밖으로 나가지 않게 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; /* 사진 업로드 전엔 투명 */
            transition: opacity 0.3s;
        }

        .profile-img.uploaded {
            opacity: 1; /* 사진 업로드 되면 나타남 */
        }

        .profile-placeholder {
            position: absolute;
            font-size: 16px;
            color: #fff;
            font-weight: 900;
        }

        #profileInput { display: none; }

        .title-area { flex-grow: 1; }

        .badge-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .nct-badge {
            background: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 900;
            border: 2px solid #000;
        }

        /* 이름 박스 전체 크기 고정 및 자동 글자 크기 조절 */
        .user-name-box {
            background: #fff;
            padding: 10px;
            border: 3px solid #000;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px; /* 박스 높이 고정 */
            box-sizing: border-box;
            overflow: hidden; /* 글자가 박스 넘치면 숨김 */
        }

        .editable-name-container {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 5px;
            width: 100%; /* 너비 꽉 차게 */
        }

        .editable-name {
            outline: none;
            border-bottom: 1px dashed #ccc;
            font-weight: 900;
            white-space: nowrap; /* 글자 길어도 줄바꿈 안되게 */
            
            /* 글자 크기 자동 조절 핵심 (container query는 모바일 지원 확인 필요하므로 JS로 처리) */
            font-size: 20px; /* 기본 크기 */
        }

        /* 고정된 글씨 크기 줄임 */
        .fixed-text {
            white-space: pre;
            font-size: 14px; /* 이름 글자보다 작게 */
            color: #555;
            font-weight: 900;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .track-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hashtag {
            font-size: 13px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        /* 기본 앨범 커버 수정 */
        .album-cover-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--nct-gray);
            border: 2px solid #000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .album-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; /* 선택 전엔 투명 */
            transition: opacity 0.3s;
        }

        .album-cover.uploaded {
            opacity: 1; /* 선택 되면 나타남 */
        }

        .cover-placeholder {
            position: absolute;
            font-size: 14px;
            color: #fff;
            font-weight: 900;
        }

        .song-title-box {
            width: calc(100% - 4px);
            background: #fff;
            border: 2px solid #000;
            margin-top: 6px;
            padding: 4px 0;
            font-size: 18px;
            text-align: center;
            font-family: var(--font-hand);
            font-weight: bold;
            min-height: 24px;
        }

        /* 최애곡 재생 바 위치 정렬 */
        .favorite-bar {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 3px solid #000;
        }

        .fav-cover-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            border: 1px solid #000;
            background-color: var(--nct-gray);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .fav-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; /* 선택 전 투명 */
            transition: opacity 0.3s;
        }

        .fav-cover.uploaded {
            opacity: 1;
        }

        .fav-placeholder {
            position: absolute;
            font-size: 10px;
            color: #fff;
            font-weight: 900;
        }

        .fav-info { flex-grow: 1; }

        .fav-title {
            font-size: 24px;
            font-family: var(--font-hand);
            display: block;
            outline: none;
        }

        /* 재생 바 위치 정렬 */
        .progress-line-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .progress-line {
            height: 4px;
            background: #eee;
            width: calc(100% - 80px); /* My Favorite 글씨 공간 확보 */
        }

        .progress-fill { width: 70%; height: 100%; background: #000; }

        .my-favorite-text {
            font-size: 10px;
            color: #888;
            outline:none;
        }

        /* 검색 모달 */
        .search-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 25px;
            border: 4px solid #000;
            width: 85%;
            max-width: 400px;
            z-index: 1000;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.7);
        }

        .search-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .search-input {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #000;
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            padding: 12px 20px;
            background: var(--nct-neon);
            border: 2px solid #000;
            font-weight: bold;
            cursor: pointer;
        }

        .search-results {
            max-height: 250px;
            overflow-y: auto;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="playlist-card">
    <div class="header">
        <div class="profile-container" onclick="document.getElementById('profileInput').click()">
            <div class="profile-placeholder">NCT</div>
            <img id="profileDisplay" src="#" class="profile-img" alt="Profile">
            <input type="file" id="profileInput" accept="image/*" onchange="loadProfile(event)">
        </div>
        <div class="title-area">
            <div class="badge-row">
                <span class="nct-badge">취향의 NCT</span>
                <span style="font-size: 10px; font-weight: 900;">NCT 10TH ANNIVERSARY</span>
            </div>
            <div class="user-name-box">
                <div class="editable-name-container">
                    <span id="userName" class="editable-name" contenteditable="true" spellcheck="false" oninput="adjustFontSize()">쟈니컬</span>
                    <span class="fixed-text"> 's Playlist</span>
                </div>
            </div>
        </div>
    </div>

    <div class="grid-container">
        <script>
            const hashtags = ['#청량', '#설렘', '#벅참', '#신남', '#네오', '#슬픔', '#중독성', '#강렬', '#퍼포먼스'];
            hashtags.forEach((tag, index) => {
                document.write(`
                    <div class="track-item" id="item-${index}">
                        <div class="hashtag">${tag}</div>
                        <div class="album-cover-container" onclick="openSearch(${index})">
                            <div class="cover-placeholder">NCT</div>
                            <img class="album-cover" src="#" alt="Select">
                        </div>
                        <div class="song-title-box">곡 제목</div>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="favorite-bar">
        <div class="fav-cover-container" onclick="openSearch('fav')">
            <div class="fav-placeholder">NCT</div>
            <img src="#" class="fav-cover" alt="Art">
        </div>
        <div class="fav-info">
            <span class="fav-title" contenteditable="true" spellcheck="false">질주 (2 Baddies)</span>
            <div class="progress-line-container">
                <div class="progress-line"><div class="progress-fill"></div></div>
                <span contenteditable="true" class="my-favorite-text">My Favorite...</span>
            </div>
        </div>
    </div>

    <div class="search-modal" id="searchModal">
        <div class="search-row">
            <input type="text" class="search-input" id="searchInput" placeholder="곡 제목 입력">
            <button class="search-btn" onclick="searchSong()">검색</button>
        </div>
        <div class="search-results" id="searchResults"></div>
        <button style="width:100%; margin-top:15px; padding:10px; background:#eee; border:2px solid #000; font-weight:bold; cursor:pointer;" onclick="closeSearch()">닫기</button>
    </div>
</div>

<script>
    let currentItemIndex = null;

    // 프로필 이미지 업로드 로직 수정 (업로드 되면 나타나게)
    function loadProfile(event) {
        const output = document.getElementById('profileDisplay');
        output.src = URL.createObjectURL(event.target.files[0]);
        output.classList.add('uploaded'); // 사진 나타남
    }

    // 이름 글자 크기 자동 조절 함수
    function adjustFontSize() {
        const userNameSpan = document.getElementById('userName');
        const container = userNameSpan.parentElement; // editable-name-container
        
        let fontSize = 20; // 기본 크기
        userNameSpan.style.fontSize = fontSize + 'px';
        
        // 이름이 컨테이너 너비를 넘어가면 글자 크기 줄임 (최소 10px까지)
        while (userNameSpan.offsetWidth > container.offsetWidth - 20 && fontSize > 10) {
            fontSize -= 1;
            userNameSpan.style.fontSize = fontSize + 'px';
        }
    }

    // 페이지 로드 시 이름 글자 크기 조절 초기 실행
    window.onload = function() {
        adjustFontSize();
    };

    function openSearch(index) {
        currentItemIndex = index;
        document.getElementById('searchModal').style.display = 'block';
        document.getElementById('searchInput').focus();
    }

    function closeSearch() {
        document.getElementById('searchModal').style.display = 'none';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = '';
    }

    async function searchSong() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '검색 중...';

        try {
            const response = await fetch(`https://itunes.apple.com/search?term=NCT+${query}&entity=song&limit=10`);
            const data = await response.json();
            resultsDiv.innerHTML = '';

            data.results.forEach(song => {
                const item = document.createElement('div');
                item.className = 'result-item';
                const highResCover = song.artworkUrl100.replace('100x100bb', '600x600bb');
                item.innerHTML = `
                    <img src="${song.artworkUrl60}" style="width:40px; border-radius:4px; border:1px solid #000;">
                    <div><strong>${song.trackName}</strong><br><small>${song.artistName}</small></div>
                `;
                item.onclick = () => selectSong(highResCover, song.trackName);
                resultsDiv.appendChild(item);
            });
        } catch (e) { resultsDiv.innerHTML = '검색 실패'; }
    }

    function selectSong(coverUrl, title) {
        let imgTag;
        if(currentItemIndex === 'fav') {
            imgTag = document.querySelector('.fav-cover');
            document.querySelector('.fav-title').innerText = title;
        } else {
            const item = document.getElementById(`item-${currentItemIndex}`);
            imgTag = item.querySelector('.album-cover');
            item.querySelector('.song-title-box').innerText = title;
        }
        
        // 앨범 커버 이미지 업로드 시 나타나게
        imgTag.src = coverUrl;
        imgTag.classList.add('uploaded');
        
        closeSearch();
    }
</script>

</body>
</html>
