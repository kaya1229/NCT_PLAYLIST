<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>취향의 NCT 플레이리스트</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root {
            --nct-neon: #CBFF00;
            --bg-yellow: #C5E061; 
            --nct-light: #E6F3A6; 
            --font-hand: 'Nanum Pen Script', cursive;
            --font-gothic: 'Pretendard', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            font-family: var(--font-gothic);
        }

        .playlist-card {
            background-color: var(--bg-yellow);
            width: 100%;
            max-width: 450px;
            padding: 25px 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        /* --- 헤더 영역 (로고 우측 배치) --- */
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
        
        .profile-container {
            width: 75px; height: 75px; border-radius: 50%; border: 3px solid #000;
            background-color: var(--nct-light); cursor: pointer; position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .profile-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .profile-img.uploaded { opacity: 1; }
        .profile-placeholder { position: absolute; font-size: 14px; color: #000; font-weight: 900; z-index: 1; }

        .title-area { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        
        .badge-row { 
            display: flex; 
            justify-content: space-between; /* 양 끝 정렬 */
            align-items: center; 
            width: 100%;
        }
        
        .nct-badge {
            background: var(--nct-light); padding: 5px 15px; border-radius: 20px;
            font-size: 14px; font-weight: 900; border: none;
        }

        .nct-10th-logo {
            height: 28px;
            width: auto;
            object-fit: contain;
        }

        .user-name-box {
            background: var(--nct-light); padding: 0 12px; border: none;
            border-radius: 8px; display: flex; align-items: center; justify-content: flex-end; height: 45px;
            box-sizing: border-box; width: 100%;
        }
        .editable-name { outline: none; font-weight: 900; font-size: 18px; text-align: right; }
        .fixed-text { font-size: 14px; font-weight: 900; margin-left: 4px; }

        /* --- 그리드 영역 (무테) --- */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .track-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 6px; }
        .hashtag { font-size: 10px; font-weight: 900; margin-bottom: 2px; }
        .album-cover-container { width: 100%; aspect-ratio: 1/1; background-color: #fff; border-radius: 12px; position: relative; overflow: hidden; }
        .album-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 2; }
        .album-cover.uploaded { opacity: 1; }
        .song-title-box { width: 100%; background: var(--nct-light); border-radius: 6px; height: 26px; display: flex; justify-content: center; align-items: center; padding: 0 4px; }
        .song-title-text { font-family: var(--font-hand); font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; }

        /* --- 최애곡 박스 (무테 및 위치 조정) --- */
        .favorite-bar { 
            background: var(--nct-light); border-radius: 15px; padding: 12px; 
            display: flex; align-items: center; gap: 15px; border: none; cursor: pointer; 
        }
        .fav-cover-container { width: 65px; height: 65px; border-radius: 8px; background-color: #fff; position: relative; overflow: hidden; flex-shrink: 0; }
        .fav-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0; }
        .fav-cover.uploaded { opacity: 1; }
        .fav-info { flex-grow: 1; overflow: hidden; position: relative; } /* position relative 추가 */
        .fav-title { font-size: 34px; font-family: var(--font-hand); line-height: 1; display: block; margin-bottom: 8px; }
        
        .progress-container { width: 100%; height: 5px; background: #bbb; position: relative; border-radius: 2px; overflow: hidden; }
        .progress-fill { width: 70%; height: 100%; background: #000; }
        
        /* My Favorite... 위치 조정 (재생바 우측 하단) */
        .my-favorite-text { 
            font-size: 10px; 
            font-weight: 900; 
            text-align: right; 
            display: block; 
            margin-top: 5px; 
        }

        .submit-btn { background-color: var(--nct-neon); border: 3px solid #000; padding: 12px 40px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0px #000; margin-top: 25px; border-radius: 10px; transition: 0.1s; }
        .submit-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }

        /* 모달 및 결과창 */
        .search-modal, .result-screen {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border: 4px solid #000; width: 85%; max-width: 400px; z-index: 1000;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.8); border-radius: 15px;
        }
        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .search-input { flex-grow: 1; padding: 10px; border: 2px solid #000; outline: none; border-radius: 8px; }
        .search-btn { padding: 10px 15px; background: var(--nct-neon); border: 2px solid #000; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .search-results { max-height: 250px; overflow-y: auto; }
        .result-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .close-modal-btn { display: block; margin: 15px auto 0; padding: 8px 25px; border: 2px solid #000; background: #eee; cursor: pointer; font-weight: bold; border-radius: 20px; }

        /* 로딩 애니메이션 */
        .loading-lp-container { display: flex; flex-direction: column; align-items: center; padding: 30px; gap: 20px; }
        .lp-spinner {
            width: 60px; height: 60px; 
            background: radial-gradient(circle, #333 15%, #111 20%, #222 25%, #111 100%);
            border-radius: 50%; border: 2px solid #000; position: relative; animation: spinLP 1.5s linear infinite;
        }
        .lp-spinner::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: var(--nct-neon); border-radius: 50%; border: 1.5px solid #000; }
        @keyframes spinLP { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="playlist-card">
    <div class="header">
        <div class="profile-container" onclick="document.getElementById('profileInput').click()">
            <div class="profile-placeholder">NCT</div>
            <img id="profileDisplay" src="#" class="profile-img">
            <input type="file" id="profileInput" style="display:none" onchange="loadProfile(event)">
        </div>
        <div class="title-area">
            <div class="badge-row">
                <span class="nct-badge">취향의 NCT</span>
                <img src="https://i.ibb.co/3S7CjY8/NCT-10-TH-ANNIV-LOGO.png" alt="NCT 10TH" class="nct-10th-logo" onerror="this.src='https://via.placeholder.com/100x30?text=NCT+10TH'">
            </div>
            <div class="user-name-box">
                <span id="userName" class="editable-name" contenteditable="true">시즈니</span>
                <span class="fixed-text">'s Playlist</span>
            </div>
        </div>
    </div>

    <div class="grid-container" id="mainGrid"></div>

    <div class="favorite-bar" onclick="openSearch('fav')">
        <div class="fav-cover-container">
            <img id="favCover" src="#" class="fav-cover">
        </div>
        <div class="fav-info">
            <span id="favTitle" class="fav-title">선택안함</span>
            <div class="progress-container">
                <div class="progress-fill"></div>
            </div>
            <span class="my-favorite-text">My Favorite...</span>
        </div>
    </div>
</div>

<button class="submit-btn" onclick="showRankResult()">💚 소울메이트 찾기</button>

<div class="search-modal" id="searchModal">
    <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="곡 제목 입력">
        <button class="search-btn" onclick="searchSong()">검색</button>
    </div>
    <div class="search-results" id="searchResults"></div>
    <button class="close-modal-btn" onclick="closeSearch()">닫기</button>
</div>

<div class="result-screen" id="resultScreen">
    <div style="text-align:center">
        <h2>우리의 싱크로율</h2>
        <div style="width: 80px; height: 80px; background:#000; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:10px auto; font-size:24px; font-weight:bold; border:3px solid var(--nct-neon)">
            <span id="syncScore">0</span>%
        </div>
        <div id="rankList" style="text-align:left; margin:15px 0; font-size: 14px; font-weight: bold;"></div>
        <button class="submit-btn" style="width:100%" onclick="closeResult()">닫기</button>
    </div>
</div>

<script>
    // 멤버 데이터 DB
    const memberData = [
        { name: "태용", tracks: ["PADO", "Touch", "Kick It", "Make a wish", "Black on Black", "From home", "Baby don't stop", "Baggy Jeans", "Universe"], favorite: "Misfit" },
        { name: "쟈니", tracks: ["Ice tea", "surf", "broken melodies", "fact check", "parade", "from home", "baggy jeans", "gas", "cherry bomb"], favorite: "2 Baddies" },
        { name: "유타", tracks: ["touch", "promise you", "Fire Truck", "sunny road", "from home", "back 2u", "fact check", "2 Baddies", "boss"], favorite: "Kick It" },
        { name: "쿤", tracks: ["rainy day", "sweet dream", "love talk", "Kick It", "The 7th Sense", "No Longer", "kick back", "phantom", "baggy jeans"], favorite: "first time" },
        { name: "텐", tracks: ["steady", "beautiful", "resonance", "misfit", "baggy jeans", "from home", "baby don't stop", "work it", "make a wish"], favorite: "that's not fair" },
        { name: "샤오쥔", tracks: ["beautiful", "all about you", "my everything", "the beat", "cherry bomb", "love after me", "baggy jeans", "turn back time", "resonance"], favorite: "cherry bomb" },
        { name: "헨드리", tracks: ["pado", "baby don't stop", "from home", "90's love", "The 7th Sense", "beautiful", "cherry bomb", "the beat", "call D"], favorite: "misfit" },
        { name: "런쥔", tracks: ["Beatbox", "Candle Light", "Trigger the Fever", "Moonlight", "The 7th Sense", "My Everything", "Candy", "Smoothie", "Beat it up"], favorite: "Hot Sauce" },
        { name: "제노", tracks: ["Wish", "Touch", "Hello Future", "Fact Check", "Work It", "To My First", "Baggy Jeans", "Far", "Kick It"], favorite: "The 7th Sense" },
        { name: "해찬", tracks: ["Hello Future", "Focus", "Dream Comes True", "Misfit", "Mad Dog", "Back 2U", "Baggy Jeans", "Kick It", "The 7th Sense"], favorite: "Kick It" },
        { name: "재민", tracks: ["We Go Up", "Focus", "No Longer", "Dream Team", "Work It", "Dear Dream", "Chiller", "The 7th Sense", "Make a Wish"], favorite: "Graduation" },
        { name: "양양", tracks: ["Chewing Gum", "My Everything", "Eternal White", "90's Love", "That's not fair", "Gold Dust", "Kick It", "The 7th Sense", "Universe"], favorite: "New Axis" },
        { name: "천러", tracks: ["Hello Future", "Moon", "Broken Melodies", "Trigger the Fever", "Cherry Bomb", "Graduation", "Beat it up", "Turn back time", "Kick It"], favorite: "My Youth" },
        { name: "지성", tracks: ["Dunk Shot", "Vroom", "My Youth", "Trigger the Fever", "Work It", "Dear Dream", "Make a Wish", "Kick It", "Black on Black"], favorite: "I hate fruits" },
        { name: "시온", tracks: ["Steady", "Touch", "Timeless", "My First and Last", "Fire Truck", "Gold Dust", "Kick It", "Black on Black", "Cherry Bomb"], favorite: "Baggy Jeans" },
        { name: "리쿠", tracks: ["Hello Future", "1000", "Misfit", "Make You Shine", "The 7th Sense", "Baby Don't Like It", "Hellow Mellow", "Kick It", "Baggy Jeans"], favorite: "Steady" },
        { name: "유우시", tracks: ["We Go Up", "Once Again", "Favorite", "Work It", "Kick It", "White Night", "Kick It", "Cherry Bomb", "Resonance"], favorite: "Wish" },
        { name: "재희", tracks: ["Wish", "First Time", "Broken Melodies", "Ping Pong", "The 7th Sense", "No Longer", "Kick It", "Ay-Yo", "Baggy Jeans"], favorite: "Coming Home" },
        { name: "료", tracks: ["Hello Future", "Sun&Moon", "Timeless", "0 Mile", "The 7th Sense", "Fly Away With Me", "Steady", "Mad City", "Baggy Jeans"], favorite: "Baby Don't Like It" },
        { name: "사쿠야", tracks: ["Best Friend Ever", "I.O.U", "Kick Back", "Paradise", "New Axis", "Piano", "Light Bulb", "Gimme Gimme", "PADO"], favorite: "Dancing In The Rain" }
    ];

    // 그리드 초기화
    const hashtags = ['#청량', '#설렘', '#벅참', '#신남', '#네오', '#슬픔', '#중독성', '#강렬', '#퍼포먼스'];
    const grid = document.getElementById('mainGrid');
    hashtags.forEach((tag, index) => {
        grid.innerHTML += `
            <div class="track-item" id="item-${index}" onclick="openSearch(${index})">
                <div class="hashtag">${tag}</div>
                <div class="album-cover-container">
                    <img class="album-cover" src="#">
                </div>
                <div class="song-title-box">
                    <span class="song-title-text"></span>
                </div>
            </div>
        `;
    });

    let currentItemIndex = null;
    function openSearch(idx) { currentItemIndex = idx; document.getElementById('searchModal').style.display = 'block'; }
    function closeSearch() { document.getElementById('searchModal').style.display = 'none'; }

    async function searchSong() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;
        const resDiv = document.getElementById('searchResults');
        resDiv.innerHTML = `<div class="loading-lp-container"><div class="lp-spinner"></div><div>NCT 감성 분석 중...</div></div>`;
        const res = await fetch(`https://itunes.apple.com/search?term=NCT+${query}&entity=song&limit=10`);
        const data = await res.json();
        resDiv.innerHTML = '';
        data.results.forEach(s => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<img src="${s.artworkUrl60}" style="width:40px; border-radius:4px; margin-right:10px;">
                             <div><strong>${s.trackName}</strong><br><small>${s.artistName}</small></div>`;
            div.onclick = () => selectSong(s.artworkUrl100.replace('100x100bb', '600x600bb'), s.trackName);
            resDiv.appendChild(div);
        });
    }

    function selectSong(url, title) {
        if(currentItemIndex === 'fav') {
            document.getElementById('favCover').src = url; document.getElementById('favCover').classList.add('uploaded');
            document.getElementById('favTitle').innerText = title;
        } else {
            const item = document.getElementById(`item-${currentItemIndex}`);
            item.querySelector('.album-cover').src = url; item.querySelector('.album-cover').classList.add('uploaded');
            item.querySelector('.song-title-text').innerText = title;
        }
        closeSearch();
    }

    function normalize(t) { return t.toLowerCase().replace(/\([^)]*\)|[\s\-_]/g, ""); }
    
    function showRankResult() {
        const userSongs = Array.from({length: 9}, (_, i) => document.getElementById(`item-${i}`).querySelector('.song-title-text').innerText);
        const userFav = document.getElementById('favTitle').innerText;
        
        const results = memberData.map(m => {
            let score = 0;
            const mTracks = m.tracks.map(t => normalize(t));
            userSongs.forEach((song, i) => {
                if(!song) return;
                const uNorm = normalize(song);
                if(uNorm === mTracks[i]) score += 10;
                else if(mTracks.includes(uNorm)) score += 5;
            });
            if(normalize(userFav) === normalize(m.favorite)) score += 15;
            return { name: m.name, score: Math.min(Math.round((score/105)*100), 100) };
        }).sort((a,b) => b.score - a.score);

        document.getElementById('syncScore').innerText = results[0].score;
        document.getElementById('rankList').innerHTML = results.slice(0,3).map((r, i) => 
            `<div style="padding:10px 0; border-bottom:1px solid #eee;">${i+1}위: 💚 ${r.name} (${r.score}%)</div>`
        ).join('');
        document.getElementById('resultScreen').style.display = 'block';
    }

    function loadProfile(e) {
        document.getElementById('profileDisplay').src = URL.createObjectURL(e.target.files[0]);
        document.getElementById('profileDisplay').classList.add('uploaded');
        document.querySelector('.profile-placeholder').style.display = 'none';
    }
    function closeResult() { document.getElementById('resultScreen').style.display = 'none'; }
    window.onclick = (e) => { if(e.target.id === 'searchModal' || e.target.id === 'resultScreen') e.target.style.display = 'none'; };
</script>

</body>
</html>
